<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Twist Your Guts — app badge</title>
  <desc id="d">A dark rounded badge with two molten strands twisting around a central axis over a jagged growl waveform.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#1e1614"/>
      <stop offset="0.6" stop-color="#120d0b"/>
      <stop offset="1" stop-color="#080605"/>
    </radialGradient>
    <linearGradient id="molten" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9A2A"/>
      <stop offset="0.5" stop-color="#FF3F2E"/>
      <stop offset="1" stop-color="#C21238"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="34" y="34" width="444" height="444" rx="104" fill="url(#bg)"/>
  <rect x="34.5" y="34.5" width="443" height="443" rx="103.5" fill="none" stroke="#FF4B2E" stroke-opacity="0.16" stroke-width="2"/>
  <rect x="50" y="50" width="412" height="412" rx="90" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5"/>

  <g filter="url(#glow)" fill="none" stroke="url(#molten)" stroke-width="38" stroke-linecap="round">
    <path d="M320,120 C320,164 192,172 192,216 C192,260 320,268 320,312 C320,356 192,364 192,408"/>
    <path d="M192,120 C192,164 320,172 320,216 C320,260 192,268 192,312 C192,356 320,364 320,408"/>
  </g>
  <g fill="#FFD8A6">
    <circle cx="256" cy="168" r="12"/>
    <circle cx="256" cy="264" r="13"/>
    <circle cx="256" cy="360" r="12"/>
  </g>

  <polyline points="120,442 150,416 172,460 200,420 228,452 256,402 284,452 312,420 340,460 362,416 392,442"
    fill="none" stroke="url(#molten)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
</svg>
