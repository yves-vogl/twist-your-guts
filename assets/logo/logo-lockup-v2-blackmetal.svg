<svg viewBox="0 0 760 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Twist Your Guts — black metal logo lockup</title>
  <desc id="d">The thorned sigil above a raw, eroded uppercase wordmark; GUTS bleeds red; a tagline sits beneath.</desc>
  <defs>
    <filter id="r2" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.017" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rt" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft2"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" result="g"/>
      <feColorMatrix in="g" type="matrix" values="0 0 0 0 0.86  0 0 0 0 0.83  0 0 0 0 0.78  0 0 0 0.6 0"/>
    </filter>
    <g id="half2">
      <path d="M258,242 C326,204 366,176 412,120 C372,180 330,214 262,260 Z"/>
      <path d="M262,250 C332,236 392,242 456,232 C392,258 332,264 264,270 Z"/>
      <path d="M262,266 C326,302 362,338 404,398 C368,342 328,306 258,272 Z"/>
      <path d="M300,214 C332,196 352,182 372,160 C352,190 334,206 306,226 Z"/>
    </g>
  </defs>

  <rect width="760" height="640" fill="#060505"/>

  <!-- emblem, centered top -->
  <g transform="translate(230,10) scale(0.586)">
    <ellipse cx="256" cy="286" rx="140" ry="176" fill="#7d0a0f" opacity="0.16" filter="url(#soft2)"/>
    <g fill="none" stroke="#c9c4bb" stroke-width="3" opacity="0.4" filter="url(#r2)">
      <path d="M120,150 A196,196 0 0 1 392,150"/>
      <path d="M402,196 A196,196 0 0 1 330,404"/>
      <path d="M182,404 A196,196 0 0 1 110,196"/>
    </g>
    <g fill="#E4E0D8" filter="url(#r2)">
      <use href="#half2"/>
      <use href="#half2" transform="matrix(-1,0,0,1,512,0)"/>
      <path d="M246,236 L256,54 L266,236 C260,246 252,246 246,236 Z"/>
      <path d="M249,288 L256,462 L263,288 Z"/>
      <path d="M256,206 L272,244 L312,256 L272,268 L256,306 L240,268 L200,256 L240,244 Z"/>
      <circle cx="256" cy="256" r="7" fill="#060505"/>
    </g>
    <g fill="#a20e14">
      <path d="M262,300 C266,338 258,360 264,398 C270,360 276,338 270,302 Z" opacity="0.9"/>
      <ellipse cx="266" cy="430" rx="5" ry="11"/><ellipse cx="252" cy="452" rx="4" ry="8"/>
      <circle cx="278" cy="470" r="4"/><circle cx="300" cy="360" r="3.2" opacity="0.8"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="'Oswald','Arial Narrow',Impact,sans-serif" font-weight="900" text-anchor="middle" filter="url(#rt)">
    <text x="380" y="392" font-size="62" letter-spacing="10" fill="#E4E0D8">TWIST</text>
    <text x="380" y="452" font-size="62" letter-spacing="10" fill="#E4E0D8">YOUR</text>
    <text x="380" y="524" font-size="82" letter-spacing="6" fill="#B01218">GUTS</text>
  </g>
  <path d="M300,538 C340,532 420,532 462,540 C420,548 340,548 300,540 Z" fill="#7d0a0f" opacity="0.85"/>
  <text x="380" y="590" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600"
    font-size="16" letter-spacing="3" fill="#8f8b84">PARALLAX-STYLE BASS SPLIT · COMPRESS THE LOWS · DISTORT THE TOPS</text>

  <rect width="760" height="640" filter="url(#grain2)" opacity="0.1"/>
</svg>
